<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Archiver Remote Console</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        h1 { margin-top: 0; font-size: 24px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        /* Layout Fix: Standardizing vertical element rhythm so fields never overlap */
        .form-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .config-grid {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 6px;
        }

        .config-group { 
            display: flex; 
            flex-direction: column; 
            width: 100%;
        }

        label { font-weight: bold; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        
        input, select, textarea {
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            box-sizing: border-box;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); }

        /* Expanded and completely isolated textarea framework */
        textarea { 
            height: 240px; 
            font-family: 'Fira Code', 'Courier New', monospace; 
            line-height: 1.6;
            resize: vertical; 
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .progress-container { margin-top: 25px; display: none; }
        .progress-bar-wrapper {
            background: #334155;
            border-radius: 100px;
            overflow: hidden;
            height: 22px;
            width: 100%;
            position: relative;
        }
        .progress-bar {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }
        .progress-text { text-align: center; font-weight: bold; margin-top: 8px; font-size: 14px; }

        .log-box {
            background: #000;
            font-family: monospace;
            padding: 15px;
            border-radius: 6px;
            height: 180px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 12px;
            color: #a7f3d0;
            display: none;
            border: 1px solid #334155;
        }

        .download-zone { margin-top: 25px; text-align: center; display: none; }
        .download-btn { background: var(--success); text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box; text-align: center; line-height: 48px; font-weight: bold; color: white; border-radius: 6px; cursor: pointer; }
        .download-btn:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h1>Webpage Archiver Remote Console</h1>
    
    <!-- Unified layout system prevents structural blocking -->
    <div class="form-layout">
        <!-- Configuration Credentials -->
        <div class="config-grid">
            <div class="config-group">
                <label for="passkeyInput">Custom Secret Key:</label>
                <input type="password" id="passkeyInput" placeholder="Enter your custom secret key to unlock runner...">
            </div>
        </div>

        <!-- Execution Settings (Now safely separated) -->
        <div class="config-group">
            <label for="urlInput">Target URLs (One per line):</label>
            <textarea id="urlInput" placeholder="https://example.com&#10;https://google.com&#10;https://github.com"></textarea>
        </div>

        <!-- Toggle Parameters -->
        <div class="config-group">
            <label for="renderJs">Render JavaScript:</label>
            <select id="renderJs">
                <option value="true">True (Headless Chrome)</option>
                <option value="false">False (Fast Raw Fetch)</option>
            </select>
        </div>
    </div>

    <button id="actionBtn" onclick="startProcess()">Trigger Remote GitHub Archive</button>

    <!-- Execution Status View Tracking -->
    <div class="progress-container" id="progressContainer">
        <label id="progressStage">Pipeline Status:</label>
        <div class="progress-bar-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0% Completed</div>
    </div>

    <div class="log-box" id="logBox"></div>

    <div class="download-zone" id="downloadZone">
        <h3>GitHub Runner Pipeline Successful!</h3>
        <button class="download-btn" id="dlBtn">Download Completed ZIP Artifact</button>
    </div>
</div>

<script>
    let pollInterval = null;

    // Val Town URL endpoint configuration
    const BACKEND_URL = "https://unboundddestiny--9f7a64b881cc11f1b3361607ee4eb77e.web.val.run"; 
    const REPO = "unbounddDestiny/miming-html";

    function getCustomSecretKey() {
        return document.getElementById('passkeyInput').value.trim();
    }

    function appendLog(text, type = 'info') {
        const logBox = document.getElementById('logBox');
        logBox.style.display = 'block';
        let color = '#a7f3d0'; 
        if (type === 'error') color = '#ef4444';
        if (type === 'warn') color = '#fbbf24';
        logBox.innerHTML += `<span style="color: ${color}">[${new Date().toLocaleTimeString()}] ${text}</span><br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function startProcess() {
        const customSecretKey = getCustomSecretKey();
        const rawUrls = document.getElementById('urlInput').value.split('\n').map(u => u.trim()).filter(u => u.length > 0);

        if (!customSecretKey || rawUrls.length === 0) {
            alert('Please provide your Custom Secret Key and target URLs.');
            return;
        }

        let inputUrl = rawUrls.length === 1 ? rawUrls[0] : "";

        document.getElementById('actionBtn').disabled = true;
        document.getElementById('downloadZone').style.display = 'none';
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('logBox').innerHTML = '';
        
        updateProgress(5, "Contacting secure abstraction backend server...");
        appendLog("Forwarding secret authorization verification to proxy host...");

        try {
            const backendRes = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Custom-Auth': customSecretKey
                },
                body: JSON.stringify({
                    inputUrl: inputUrl,
                    renderJs: document.getElementById('renderJs').value
                })
            });

            const data = await backendRes.json();

            if (!backendRes.ok) {
                throw new Error(data.error || "Server transaction rejected.");
            }

            appendLog("Backend successfully verified code and triggered GitHub workflow event.");
            updateProgress(20, "Waiting for GitHub server provisioning...");
            
            setTimeout(() => trackWorkflowRun(), 10000);

        } catch (error) {
            appendLog(`Authorization/Execution Halt: ${error.message}`, 'error');
            resetUI();
        }
    }

    async function trackWorkflowRun() {
        try {
            appendLog("Scanning secure proxy for the active worker ID...");
            
            const response = await fetch(`${BACKEND_URL}?action=track`, {
                method: 'GET',
                headers: { 'X-Custom-Auth': getCustomSecretKey() }
            });
            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error || "Failed to contact proxy tracking repository logs.");
            if (!data.runId) throw new Error("No visible logs found on repository pipeline record.");

            const runId = data.runId;
            appendLog(`Identified Active Tracker Target: Run ID #${runId}`);

            pollInterval = setInterval(() => checkStatus(runId), 7000);

        } catch (err) {
            appendLog(`Polling locator fault: ${err.message}`, 'error');
            resetUI();
        }
    }

    async function checkStatus(runId) {
        try {
            const response = await fetch(`${BACKEND_URL}?runId=${runId}`, {
                method: 'GET',
                headers: { 'X-Custom-Auth': getCustomSecretKey() }
            });
            const runInfo = await response.json();
            
            if (!response.ok) throw new Error(runInfo.error || "Failed to update tracking run status.");
            
            const status = runInfo.status; 
            const conclusion = runInfo.conclusion; 

            appendLog(`Worker status read-update: ${status}...`);

            if (status === "queued") {
                updateProgress(35, "Job in global GitHub Queue...");
            } else if (status === "in_progress") {
                updateProgress(65, "Archiver processing targeted assets... (Running)");
            } else if (status === "completed") {
                clearInterval(pollInterval);
                
                if (conclusion === "success") {
                    updateProgress(90, "Processing complete! Accessing download artifact assets...");
                    await locateAndLinkArtifact(runId);
                } else {
                    updateProgress(100, `Execution halted with state error: ${conclusion}`, 'error');
                    appendLog(`Pipeline error return code match detected. Check repo action panel logs.`, 'error');
                    resetUI();
                }
            }
        } catch (err) {
            appendLog(`Error polling check status updates: ${err.message}`, 'error');
        }
    }

    async function locateAndLinkArtifact(runId) {
        try {
            appendLog("Searching target download links via backend proxy...");
            
            const response = await fetch(`${BACKEND_URL}?action=getArtifact&runId=${runId}`, {
                method: 'GET',
                headers: { 'X-Custom-Auth': getCustomSecretKey() }
            });
            const data = await response.json();

            if (!response.ok) throw new Error(data.error || "Failed to clear artifact validation.");
            if (!data.artifactId) {
                throw new Error("Completed run without locating 'all-snapshots' file container output target.");
            }

            const downloadUrl = `https://github.com/${REPO}/actions/runs/${runId}/artifacts/${data.artifactId}`;
            
            updateProgress(100, "Success! Package Ready.");
            document.getElementById('progressBar').style.backgroundColor = 'var(--success)';
            
            const dlBtn = document.getElementById('dlBtn');
            dlBtn.onclick = () => {
                window.open(downloadUrl, '_blank');
                appendLog("Redirected to public GitHub artifact package download link.");
            };
            
            document.getElementById('downloadZone').style.display = 'block';
            appendLog(`[Finished] Package located! Download link armed.`);
            document.getElementById('actionBtn').disabled = false;

        } catch (err) {
            appendLog(`Artifact mapping resolution failed: ${err.message}`, 'error');
            resetUI();
        }
    }

    function updateProgress(percentage, text, mode = 'normal') {
        const bar = document.getElementById('progressBar');
        const txt = document.getElementById('progressText');
        bar.style.width = `${percentage}%`;
        txt.innerText = `${percentage}% - ${text}`;
        if(mode === 'error') bar.style.backgroundColor = 'var(--error)';
    }

    function resetUI() {
        if(pollInterval) clearInterval(pollInterval);
        document.getElementById('actionBtn').disabled = false;
    }
</script>

</body>
</html>
