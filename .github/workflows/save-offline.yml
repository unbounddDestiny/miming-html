name: Save Website Offline (Robust Base64 Universal HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm install playwright mhtml-to-html
        npx playwright install chromium --with-deps

    - name: Capture Page and Convert to Base64 HTML
      run: |
        cat << 'EOF' > capture.js
        const { chromium } = require('playwright');
        const fs = require('fs');
        const mhtmlToHtml = require('mhtml-to-html');

        (async () => {
          console.log("Launching automated browser engine...");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            viewport: { width: 1280, height: 2000 }
          });
          const page = await context.newPage();

          console.log("Navigating to target URL...");
          await page.goto(process.env.TARGET_URL, { waitUntil: 'load', timeout: 90000 });

          console.log("Executing precise scroll-down loop to un-lazy-load content...");
          await page.evaluate(async () => {
            await new Promise((resolve) => {
              let totalHeight = 0;
              const distance = 300; // Small increments mimic human behavior
              const timer = setInterval(() => {
                const scrollHeight = document.body.scrollHeight;
                window.scrollBy(0, distance);
                totalHeight += distance;

                if (totalHeight >= scrollHeight || totalHeight > 80000) { 
                  clearInterval(timer);
                  resolve();
                }
              }, 150);
            });
          });

          // Allow the background thread connection pipes a brief moment to settle
          console.log("Waiting for network pipeline to settle completely...");
          await page.waitForLoadState('networkidle');
          await page.waitForTimeout(3000);

          console.log("Using CDP connection to capture the compiled memory snapshot...");
          const client = await context.newCDPSession(page);
          const { data } = await client.send('Page.captureSnapshot', { format: 'mhtml' });
          
          fs.writeFileSync('raw_snapshot.mhtml', data);
          await browser.close();

          console.log("De-serializing snapshot and building Base64 HTML compilation archive...");
          try {
            const mhtmlContent = fs.readFileSync('raw_snapshot.mhtml', 'utf-8');
            
            // Extract the snapshot and re-encode all components into an isolated HTML file
            const convertedHtml = mhtmlToHtml.convert(mhtmlContent);
            
            fs.writeFileSync(process.env.OUTPUT_FILENAME, convertedHtml);
            console.log(`Compilation successful! File saved: ${process.env.OUTPUT_FILENAME}`);
          } catch (convertError) {
            console.error("Conversion failed, falling back to clean data dump:", convertError.message);
            fs.writeFileSync(process.env.OUTPUT_FILENAME, data);
          } finally {
            if (fs.existsSync('raw_snapshot.mhtml')) fs.unlinkSync('raw_snapshot.mhtml');
          }
        })();
        EOF
        
        TARGET_URL="${{ github.event.inputs.url }}" OUTPUT_FILENAME="${{ github.event.inputs.filename }}.html" node capture.js

    - name: Upload HTML Document as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
