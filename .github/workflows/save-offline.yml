name: Save Website Offline (Perfect Inline Base64 HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    - name: Execute Native Base64 Inline Scraping
      run: |
        cat << 'EOF' > capture.js
        const { chromium } = require('playwright');
        const fs = require('fs');

        (async () => {
          console.log("Launching automated browser engine...");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36',
            viewport: { width: 1200, height: 2500 }
          });
          const page = await context.newPage();

          console.log("Navigating to target URL...");
          await page.goto(process.env.TARGET_URL, { waitUntil: 'load', timeout: 90000 });

          console.log("Executing deep scroll-down loop to uncover all comic panels...");
          // Loops dynamically until the layout height stops increasing
          await page.evaluate(async () => {
            await new Promise((resolve) => {
              let totalHeight = 0;
              const distance = 400; 
              const timer = setInterval(() => {
                const scrollHeight = document.body.scrollHeight;
                window.scrollBy(0, distance);
                totalHeight += distance;

                // Stop scrolling if we reach the genuine bottom or safety limit (extended to 300,000px)
                if (totalHeight >= scrollHeight || totalHeight > 300000) { 
                  clearInterval(timer);
                  window.scrollTo(0, 0); // Scroll back up to ensure all rendering pipelines initialize
                  resolve();
                }
              }, 60); // Faster scroll intervals to process large chapters efficiently
            });
          });

          console.log("Waiting for network traffic to drop and lazy loads to complete...");
          await page.waitForLoadState('networkidle');
          await page.waitForTimeout(6000);

          console.log("Extracting titles and encoding comic panels directly into custom array templates...");
          const structuralData = await page.evaluate(async () => {
            const pageTitle = document.title || "Comic Chapter";
            
            // Conversion fallback mechanics
            const convertImageToBase64 = async (imgElement) => {
              try {
                const canvas = document.createElement('canvas');
                canvas.width = imgElement.naturalWidth || imgElement.width;
                canvas.height = imgElement.naturalHeight || imgElement.height;
                if (canvas.width === 0 || canvas.height === 0) return null;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgElement, 0, 0);
                return canvas.toDataURL('image/jpeg', 0.85); // 85% compression keeps files highly performant
              } catch (e) {
                try {
                  const res = await fetch(imgElement.src);
                  const blob = await res.blob();
                  return await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                  });
                } catch (err) {
                  return null;
                }
              }
            };

            // Grab all images residing within standard content layouts or image wrapper zones
            const rawImages = Array.from(document.querySelectorAll('img'));
            const imageBase64Array = [];

            for (const img of rawImages) {
              const srcTarget = img.src || img.getAttribute('data-src');
              // Filters out small layout files like avatar icons, tracking pixels, or interface logos
              if (srcTarget && (img.naturalWidth > 250 || img.width > 250)) {
                const base64Data = await convertImageToBase64(img);
                if (base64Data) {
                  imageBase64Array.push(base64Data);
                }
              }
            }
            return { title: pageTitle, panels: imageBase64Array };
          });

          await browser.close();

          console.log(`Successfully compiled ${structuralData.panels.length} panel streams. Rebuilding custom HTML output file...`);
          
          // Generate a custom, clean HTML template from scratch to enforce perfect layout rules
          const isolatedHtmlTemplate = `
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>${structuralData.title}</title>
              <style>
                  * { box-sizing: border-box; }
                  body, html { 
                      margin: 0; 
                      padding: 0; 
                      background-color: #0e0e11; 
                      width: 100%; 
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                  }
                  .custom-reader-container {
                      width: 100%;
                      max-width: 800px; /* Standard webcomic desktop constraint */
                      margin: 0 auto;
                      display: flex;
                      flex-direction: column;
                      background-color: #000000;
                  }
                  .comic-panel {
                      display: block;
                      width: 100% !important;
                      max-width: 100% !important;
                      height: auto !important;
                      margin: 0;
                      padding: 0;
                      border: none;
                  }
                  .header-banner {
                      padding: 20px;
                      color: #ffffff;
                      text-align: center;
                      background-color: #16161a;
                      font-size: 18px;
                      font-weight: bold;
                      border-bottom: 1px solid #232329;
                  }
              </style>
          </head>
          <body>
              <div class="custom-reader-container">
                  <div class="header-banner">${structuralData.title}</div>
                  ${structuralData.panels.map(base64 => `<img class="comic-panel" src="${base64}" alt="Comic Panel Image" />`).join('\n')}
              </div>
          </body>
          </html>
          `;

          fs.writeFileSync(process.env.OUTPUT_FILENAME, isolatedHtmlTemplate);
          console.log("Process complete!");
        })();
        EOF
        
        TARGET_URL="${{ github.event.inputs.url }}" OUTPUT_FILENAME="${{ github.event.inputs.filename }}.html" node capture.js

    - name: Upload Universal HTML Document
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
