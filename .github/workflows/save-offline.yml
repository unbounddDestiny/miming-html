name: Archive Webpage(s) to Single-File HTML

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Single URL to archive (leave blank if only using urls_file)"
        required: false
        default: ""
      urls_file:
        description: "Repo file with one URL per line (used only if it exists)"
        required: false
        default: "urls.txt"
      render_js:
        description: "Pre-render with headless Chrome (for JS-heavy / SPA sites)"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      commit_results:
        description: "Commit the generated HTML files back to this repo"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  # STEP 1: Parse and output URLs as a JSON array for the matrix
  prep-urls:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse URLs
        id: set-matrix
        env:
          URL: ${{ inputs.url }}
          URLS_FILE: ${{ inputs.urls_file }}
        run: |
          : > urls_to_process.txt

          if [ -n "$URL" ]; then
            echo "$URL" >> urls_to_process.txt
          fi

          if [ -n "$URLS_FILE" ] && [ -f "$URLS_FILE" ]; then
            cat "$URLS_FILE" >> urls_to_process.txt
          fi

          # Clean up empty lines
          sed -i '/^[[:space:]]*$/d' urls_to_process.txt
          
          # Convert plain list of URLs to JSON array format: ["url1", "url2", ...]
          JSON_ARRAY=$(jq -R -s -c 'split("\n") | map(select(length > 0))' urls_to_process.txt)
          
          echo "matrix=${JSON_ARRAY}" >> $GITHUB_OUTPUT
          echo "URLs to process: ${JSON_ARRAY}"

  # STEP 2: Run isolated parallel workers (one URL per worker)
  archive:
    needs: prep-urls
    runs-on: ubuntu-latest
    # If there are no URLs, skip the archive process gracefully
    if: ${{ needs.prep-urls.outputs.matrix != '[]' && needs.prep-urls.outputs.matrix != '' }}
    strategy:
      matrix:
        url: ${{ fromJson(needs.prep-urls.outputs.matrix) }}
      fail-fast: false # Keep archiving remaining URLs even if one fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure system-wide reputable adblocker (StevenBlack hosts)
        run: |
          echo "Setting up adblock hosts..."
          curl -sSL https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts | sudo tee -a /etc/hosts > /dev/null
          echo "Adblocker configured successfully."

      - name: Install monolith
        run: |
          set -e
          echo "Fetching latest monolith release..."
          if curl -fL -o /usr/local/bin/monolith \
            https://github.com/Y2Z/monolith/releases/latest/download/monolith-gnu-linux-x86_64; then
            chmod +x /usr/local/bin/monolith
          else
            echo "Prebuilt binary unavailable — building from source with cargo instead."
            cargo install monolith --locked
          fi
          monolith --version

      - name: Archive URL
        env:
          URL: ${{ matrix.url }}
          RENDER_JS: ${{ inputs.render_js }}
          UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
        run: |
          mkdir -p snapshots
          echo "== Archiving: $URL =="

          safe_name=$(printf '%s' "$URL" | sed -E 's~^https?://~~; s~[^a-zA-Z0-9._-]+~_~g' | cut -c1-150)
          timestamp=$(date -u +"%Y%m%d-%H%M%S")
          output_file="snapshots/${safe_name}_${timestamp}.html"

          if [ "$RENDER_JS" = "true" ]; then
            echo "Pre-rendering with headless Chrome..."
            google-chrome \
              --headless --disable-gpu --no-sandbox --disable-dev-shm-usage \
              --hide-scrollbars --window-size=1920,1080 \
              --run-all-compositor-stages-before-draw --virtual-time-budget=9000 \
              --user-agent="$UA" \
              --dump-dom "$URL" \
              | monolith - -I -e -b "$URL" -u "$UA" -o "$output_file" \
              || echo "::warning::Failed to archive $URL"
          else
            monolith "$URL" -I -e -u "$UA" -o "$output_file" \
              || echo "::warning::Failed to archive $URL"
          fi

          if [ -s "$output_file" ]; then
            echo "Saved $(du -h "$output_file" | cut -f1) -> $output_file"
          fi

      # Upload snapshot as artifact so they can be merged and committed in the next step
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          # Use a unique artifact name for each worker to prevent overrides
          name: snapshot-${{ strategy.job-index }}
          path: snapshots/
          if-no-files-found: warn
          retention-days: 1

  # STEP 3: Collect all completed snapshots and push them back to your repo
  commit:
    needs: archive
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.commit_results == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Downloads all worker artifacts to the 'snapshots' directory automatically
      - name: Download all snapshots
        uses: actions/download-artifact@v4
        with:
          path: snapshots/
          pattern: snapshot-*
          merge-multiple: true

      - name: Commit snapshots back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add if anything got tucked away inside subdirectories
          git add snapshots/
          
          if ! git diff --cached --quiet; then
            git commit -m "Add webpage snapshot(s) [skip ci]"
            git push
          else
            echo "Nothing new to commit."
          fi
