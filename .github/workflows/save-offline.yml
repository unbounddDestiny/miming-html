name: Save Website Offline (Perfect Inline Base64 HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    - name: Execute Resilient Base64 Compilation Script
      run: |
        cat << 'EOF' > capture.js
        const { chromium } = require('playwright');
        const fs = require('fs');

        (async () => {
          console.log("Launching robust automated browser session...");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36',
            viewport: { width: 1280, height: 1600 }
          });
          const page = await context.newPage();

          // Intercept and cache image buffers as they download over the wire to bypass CORS completely
          const imageBufferCache = {};
          page.on('response', async (response) => {
            const url = response.url();
            const contentType = response.headers()['content-type'] || '';
            if (contentType.startsWith('image/') && response.status() === 200) {
              try {
                const buffer = await response.buffer();
                imageBufferCache[url] = `data:${contentType};base64,${buffer.toString('base64')}`;
              } catch (e) {
                // Squelch closed-stream mapping reads
              }
            }
          });

          console.log("Navigating to target web page...");
          await page.goto(process.env.TARGET_URL, { waitUntil: 'load', timeout: 90000 });

          console.log("Executing strict progressive auto-scroll to force load comic panels...");
          // Dynamic scroll window that stops only when the absolute document bottom stays fixed
          let previousHeight = 0;
          let currentHeight = await page.evaluate(() => document.body.scrollHeight);
          let scrollCounter = 0;

          while (previousHeight !== currentHeight && scrollCounter < 150) {
            await page.evaluate(() => window.scrollBy(0, 800));
            await page.waitForTimeout(250); // Gives background lazy loaders a window to initialize
            previousHeight = currentHeight;
            currentHeight = await page.evaluate(() => document.body.scrollHeight);
            scrollCounter++;
          }

          console.log("Forcing final validation pass for asynchronous images...");
          await page.waitForLoadState('networkidle');
          await page.waitForTimeout(4000);

          console.log("Injecting layout compiler and packing original formatting assets...");
          await page.evaluate(async (cacheMap) => {
            // 1. Process and inline every image on the page using cached network buffers
            const images = Array.from(document.querySelectorAll('img'));
            for (const img of images) {
              // Resolve every potential source naming convention webcomics use
              const srcTarget = img.src || img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('data-src-img');
              if (srcTarget) {
                // Match relative asset strings to their absolute URLs
                const absoluteUrl = new URL(srcTarget, window.location.href).href;
                if (cacheMap[absoluteUrl]) {
                  img.src = cacheMap[absoluteUrl];
                  img.removeAttribute('srcset');
                  img.removeAttribute('loading');
                  img.removeAttribute('data-src');
                  img.removeAttribute('data-lazy-src');
                  img.removeAttribute('data-src-img');
                }
              }
            }

            // 2. Fetch and bake the active CSS rules directly into the page head
            let unifiedCss = '';
            for (const sheet of Array.from(document.styleSheets)) {
              try {
                for (const rule of Array.from(sheet.cssRules)) {
                  unifiedCss += rule.cssText + '\n';
                }
              } catch (crossOriginErr) {
                // Fallback: If stylesheet is locked by CORS, rebuild reference targets
                if (sheet.href) {
                  try {
                    const res = await fetch(sheet.href);
                    const cssText = await res.text();
                    unifiedCss += cssText + '\n';
                  } catch (e) {}
                }
              }
            }
            const inlineStyleTag = document.createElement('style');
            inlineStyleTag.textContent = unifiedCss;
            document.head.appendChild(inlineStyleTag);

            // 3. Enforce structural containment rules to fix formatting and giant images
            const scaleCorrectionTag = document.createElement('style');
            scaleCorrectionTag.textContent = `
              html, body { max-width: 100% !important; overflow-x: hidden !important; width: 100% !important; }
              img, .wp-manga-chapter-img img, picture img { 
                max-width: 100% !important; 
                width: 100% !important; 
                height: auto !important; 
                object-fit: contain !important;
                display: block !important;
                margin: 0 auto !important;
              }
              div, section, main, article, [class*="wrapper"], [class*="content"] { 
                max-width: 100% !important; 
                width: auto !important; 
                box-sizing: border-box !important; 
              }
            `;
            document.head.appendChild(scaleCorrectionTag);
          }, imageBufferCache);

          console.log("Exporting perfectly preserved universal HTML artifact...");
          const compiledLayoutHtml = await page.content();
          fs.writeFileSync(process.env.OUTPUT_FILENAME, compiledLayoutHtml);
          
          await browser.close();
          console.log("Process completely successful!");
        })();
        EOF
        
        TARGET_URL="${{ github.event.inputs.url }}" OUTPUT_FILENAME="${{ github.event.inputs.filename }}.html" node capture.js

    - name: Upload Universal HTML Document
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
