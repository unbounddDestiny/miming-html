name: Save Website Offline (Base64 Universal HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Playwright and SingleFile
      run: |
        npm install playwright single-file-cli
        npx playwright install chromium --with-deps

    - name: Run Scroll and Base64 Capture Script
      uses: actions/github-script@v7
      with:
        script: |
          const { chromium } = require('playwright');
          const fs = require('fs');
          const { execSync } = require('child_process');
          
          const targetUrl = '${{ github.event.inputs.url }}';
          const outputName = '${{ github.event.inputs.filename }}.html';
          
          console.log(`Launching browser for: ${targetUrl}`);
          const browser = await chromium.launch({ headless: true });
          const browserContext = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
          });
          const page = await browserContext.newPage();
          
          // Open the page and wait for major elements to drop into view
          await page.goto(targetUrl, { waitUntil: 'load', timeout: 60000 });
          
          // AUTO-SCROLL: Moves down slowly to awaken lazy-loaded images
          console.log('Scrolling page down to force image triggers...');
          await page.evaluate(async () => {
            await new Promise((resolve) => {
              let totalHeight = 0;
              const distance = 350; // Pixels per scroll step
              const timer = setInterval(() => {
                const scrollHeight = document.body.scrollHeight;
                window.scrollBy(0, distance);
                totalHeight += distance;
                
                if (totalHeight >= scrollHeight) {
                  clearInterval(timer);
                  resolve();
                }
              }, 120); // Delay between scrolls
            });
          });
          
          // Final rest period for concurrent network pipes to finish writing
          await page.waitForLoadState('networkidle');
          
          // Get the raw fully expanded HTML directly out of the DOM state
          const dynamicHtml = await page.content();
          fs.writeFileSync('temp_state.html', dynamicHtml);
          console.log('DOM state extracted. Closing playwright container.');
          await browser.close();
          
          // Process the document with SingleFile into a Base64 self-contained matrix
          console.log('Processing page to lock formatting and inline assets via Base64...');
          try {
            execSync(`npx single-file --base-url="${targetUrl}" "temp_state.html" "${outputName}"`);
            console.log(`Successfully compiled standalone Base64 HTML document: ${outputName}`);
          } catch (err) {
            console.error('SingleFile engine threw an asset formatting exception:', err.message);
            // Fallback backup write if SingleFile encounters parsing bugs on broken CSS
            fs.renameSync('temp_state.html', outputName);
          } finally {
            if (fs.existsSync('temp_state.html')) fs.unlinkSync('temp_state.html');
          }

    - name: Upload HTML Document as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
