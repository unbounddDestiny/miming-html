name: Save Website Offline (Base64 Universal HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    - name: Scroll Page and Capture Base64 HTML
      run: |
        cat << 'EOF' > capture.js
        const { chromium } = require('playwright');
        const fs = require('fs');

        (async () => {
          console.log("Launching headless browser...");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
          });
          const page = await context.newPage();

          console.log("Navigating to target URL...");
          await page.goto(process.env.TARGET_URL, { waitUntil: 'load', timeout: 60000 });

          console.log("Scrolling down to un-lazy-load manga/comic images...");
          await page.evaluate(async () => {
            await new Promise((resolve) => {
              let totalHeight = 0;
              const distance = 400;
              const timer = setInterval(() => {
                const scrollHeight = document.body.scrollHeight;
                window.scrollBy(0, distance);
                totalHeight += distance;

                if (totalHeight >= scrollHeight || totalHeight > 60000) { 
                  clearInterval(timer);
                  resolve();
                }
              }, 120);
            });
          });

          console.log("Waiting for network connections to idle...");
          await page.waitForLoadState('networkidle');

          console.log("Converting all images on the page into inline Base64 strings...");
          await page.evaluate(async () => {
            const toBase64 = url => fetch(url)
              .then(response => response.blob())
              .then(blob => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
              })).catch(() => null);

            const images = document.querySelectorAll('img');
            for (const img of images) {
              if (img.src && !img.src.startsWith('data:')) {
                const base64Str = await toBase64(img.src);
                if (base64Str) {
                  img.src = base64Str;
                  if (img.hasAttribute('srcset')) img.removeAttribute('srcset');
                  if (img.hasAttribute('data-src')) img.removeAttribute('data-src');
                }
              }
            }
          });

          console.log("Dumping self-contained HTML layout...");
          const completedHtml = await page.content();
          fs.writeFileSync(process.env.OUTPUT_FILENAME, completedHtml);
          console.log("Successfully compiled standalone HTML document.");

          await browser.close();
        })();
        EOF
        
        TARGET_URL="${{ github.event.inputs.url }}" OUTPUT_FILENAME="${{ github.event.inputs.filename }}.html" node capture.js

    - name: Upload HTML Document as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
