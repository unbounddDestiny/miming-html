name: Save Website Offline (Perfect Inline Base64 HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    - name: Execute Native Base64 Inline Scraping
      run: |
        cat << 'EOF' > capture.js
        const { chromium } = require('playwright');
        const fs = require('fs');

        (async () => {
          console.log("Launching automated browser engine...");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36',
            viewport: { width: 1200, height: 2500 }
          });
          const page = await context.newPage();

          console.log("Navigating to target URL...");
          await page.goto(process.env.TARGET_URL, { waitUntil: 'load', timeout: 90000 });

          console.log("Executing thorough scroll-down loop to un-lazy-load ALL content...");
          await page.evaluate(async () => {
            await new Promise((resolve) => {
              let totalHeight = 0;
              const distance = 350; // Smaller distance to ensure no images are skipped
              const timer = setInterval(() => {
                const scrollHeight = document.body.scrollHeight;
                window.scrollBy(0, distance);
                totalHeight += distance;

                // Increased limit to 250,000px to fully capture deep webcomic chapters
                if (totalHeight >= scrollHeight || totalHeight > 250000) { 
                  clearInterval(timer);
                  resolve();
                }
              }, 100); // Slightly slower to give the network stable time to register triggers
            });
          });

          console.log("Waiting for network traffic to settle completely...");
          await page.waitForLoadState('networkidle');
          await page.waitForTimeout(6000); // Generous pause to complete lingering image streams

          console.log("Extracting, encoding, and fixing page styles...");
          await page.evaluate(async () => {
            // 1. Download images and convert them into raw inline Base64 data strings
            const convertImageToBase64 = async (imgElement) => {
              try {
                const canvas = document.createElement('canvas');
                canvas.width = imgElement.naturalWidth || imgElement.width;
                canvas.height = imgElement.naturalHeight || imgElement.height;
                if (canvas.width === 0 || canvas.height === 0) return null;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(imgElement, 0, 0);
                return canvas.toDataURL('image/jpeg', 0.85);
              } catch (e) {
                try {
                  const res = await fetch(imgElement.src);
                  const blob = await res.blob();
                  return await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                  });
                } catch (err) {
                  return null;
                }
              }
            };

            const images = Array.from(document.querySelectorAll('img'));
            for (const img of images) {
              const srcTarget = img.src || img.getAttribute('data-src') || img.getAttribute('data-lazy-src');
              if (srcTarget && !srcTarget.startsWith('data:')) {
                const base64Data = await convertImageToBase64(img);
                if (base64Data) {
                  img.src = base64Data;
                  img.removeAttribute('srcset');
                  img.removeAttribute('loading');
                  img.removeAttribute('data-src');
                  img.removeAttribute('data-lazy-src');
                }
              }
            }

            // 2. Inline all CSS from external sheets directly into the document head
            const styles = Array.from(document.styleSheets);
            let combinedCss = '';
            for (const sheet of styles) {
              try {
                const rules = Array.from(sheet.cssRules);
                for (const rule of rules) {
                  combinedCss += rule.cssText + '\n';
                }
              } catch (e) {
                // Skips security blocks on stylesheet evaluation
              }
            }
            const styleElement = document.createElement('style');
            styleElement.textContent = combinedCss;
            document.head.appendChild(styleElement);

            // 3. Inject global containment fixes to prevent oversized elements
            const customFixes = document.createElement('style');
            customFixes.textContent = `
              /* Fixes layout breakouts by boxing the entire viewport context */
              html, body { max-width: 100% !important; overflow-x: hidden !important; }
              
              /* Prevents images from growing larger than your device screen width */
              img, .comic-panel, .wp-manga-chapter-img img { 
                max-width: 100% !important; 
                height: auto !important; 
                width: 100% !important;
                object-fit: contain !important;
              }
              
              /* Overrides breaking widths on dynamic layout wrappers */
              div, section, main, article, .reader-area, #chapter-wrapper { 
                max-width: 100% !important; 
                width: auto !important; 
                box-sizing: border-box !important;
              }
            `;
            document.head.appendChild(customFixes);
          });

          console.log("Saving finalized layout file...");
          const isolatedHtml = await page.content();
          fs.writeFileSync(process.env.OUTPUT_FILENAME, isolatedHtml);
          
          await browser.close();
          console.log("Process complete!");
        })();
        EOF
        
        TARGET_URL="${{ github.event.inputs.url }}" OUTPUT_FILENAME="${{ github.event.inputs.filename }}.html" node capture.js

    - name: Upload Universal HTML Document
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
