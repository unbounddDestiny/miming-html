name: Archive Webpage(s) to Single-File HTML

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Multiline URLs to archive"
        required: false
        default: ""
      urls_file:
        description: "Repo file with one URL per line (used only if it exists)"
        required: false
        default: "urls.txt"
      render_js:
        description: "Pre-render with headless Chrome (for JS-heavy / SPA sites)"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      commit_results:
        description: "Commit the generated HTML files back to this repo"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  # STEP 1: Parse and output URLs as a JSON array for the matrix
  prep-urls:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse URLs
        id: set-matrix
        env:
          URL_INPUT: ${{ inputs.url }}
          URLS_FILE: ${{ inputs.urls_file }}
        run: |
          :> urls_to_process.txt

          # Process the multiline input value directly
          if [ -n "$URL_INPUT" ]; then
            echo "$URL_INPUT" >> urls_to_process.txt
          fi

          if [ -n "$URLS_FILE" ] && [ -f "$URLS_FILE" ]; then
            cat "$URLS_FILE" >> urls_to_process.txt
          fi

          # Clean up any potential empty lines or spaces
          sed -i '/^[[:space:]]*$/d' urls_to_process.txt
          
          # Convert the flat list of URLs to a valid JSON array format
          JSON_ARRAY=$(jq -R -s -c 'split("\n") | map(select(length > 0))' urls_to_process.txt)
          
          echo "matrix=${JSON_ARRAY}" >> $GITHUB_OUTPUT
          echo "URLs to process: ${JSON_ARRAY}"

  # STEP 2: Run isolated parallel workers (one URL per worker)
  archive:
    needs: prep-urls
    runs-on: ubuntu-latest
    if: ${{ needs.prep-urls.outputs.matrix != '[]' && needs.prep-urls.outputs.matrix != '' }}
    strategy:
      matrix:
        url: ${{ fromJson(needs.prep-urls.outputs.matrix) }}
      fail-fast: false
    
    name: "Archive: ${{ matrix.url }}"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure system-wide reputable adblocker (StevenBlack hosts)
        run: |
          echo "Setting up adblock hosts..."
          curl -sSL https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts | sudo tee -a /etc/hosts > /dev/null
          echo "Adblocker configured successfully."

      - name: Install monolith
        run: |
          set -e
          echo "Fetching latest monolith release..."
          if curl -fL -o /usr/local/bin/monolith \
            https://github.com/Y2Z/monolith/releases/latest/download/monolith-gnu-linux-x86_64; then
            chmod +x /usr/local/bin/monolith
          else
            echo "Prebuilt binary unavailable — building from source with cargo instead."
            cargo install monolith --locked
          fi
          monolith --version

      - name: Archive Action
        env:
          URL: ${{ matrix.url }}
          RENDER_JS: ${{ inputs.render_js }}
          JOB_INDEX: ${{ strategy.job-index }}
          UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
        run: |
          mkdir -p snapshots
          echo "== Archiving target URL: $URL =="

          output_file="snapshots/url_${JOB_INDEX}.html"

          MAX_ATTEMPTS=3
          attempt=1
          success=false

          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Attempt $attempt of $MAX_ATTEMPTS..."
            
            if [ "$RENDER_JS" = "true" ]; then
              echo "Pre-rendering with headless Chrome..."
              if google-chrome \
                --headless --disable-gpu --no-sandbox --disable-dev-shm-usage \
                --hide-scrollbars --window-size=1920,1080 \
                --run-all-compositor-stages-before-draw --virtual-time-budget=9000 \
                --user-agent="$UA" \
                --dump-dom "$URL" \
                | monolith - -I -e -b "$URL" -u "$UA" -o "$output_file"; then
                success=true
                break
              fi
            else
              if monolith "$URL" -I -e -u "$UA" -o "$output_file"; then
                success=true
                break
              fi
            fi

            echo "Attempt $attempt failed."
            attempt=$((attempt + 1))
            if [ $attempt -le $MAX_ATTEMPTS ]; then
              echo "Waiting 5 seconds before reloading..."
              sleep 5
            fi
          done

          if [ "$success" = "false" ]; then
            echo "::warning::Failed to archive webpage after $MAX_ATTEMPTS attempts."
          fi

          if [ -s "$output_file" ]; then
            echo "Saved $(du -h "$output_file" | cut -f1) -> $output_file"
          fi

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ strategy.job-index }}
          path: snapshots/
          if-no-files-found: warn
          retention-days: 1

  # STEP 3: Collect all completed snapshots and package them
  commit:
    needs: archive
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all snapshots
        uses: actions/download-artifact@v4
        with:
          path: snapshots/
          pattern: snapshot-*
          merge-multiple: true

      - name: Upload Complete Archive Run Bundle
        uses: actions/upload-artifact@v4
        with:
          name: all-snapshots
          path: snapshots/

      - name: Commit snapshots back to repo
        if: ${{ inputs.commit_results == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add snapshots/
          
          if ! git diff --cached --quiet; then
            git commit -m "Add webpage snapshot(s) [skip ci]"
            git push
          else
            echo "Nothing new to commit."
          fi
