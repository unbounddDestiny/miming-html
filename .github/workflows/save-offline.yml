name: Archive Webpage(s) to Single-File HTML

# Turns one or more URLs into self-contained .html files. monolith embeds
# every image, stylesheet, script, and font it can reach as base64 data
# URIs directly inside the HTML, so each output file is a single,
# offline-viewable "carbon copy" of the page — no separate assets folder.
#
# Give it URLs one of two ways:
#   1. The "url" input when you run the workflow manually
#   2. A text file in the repo (one URL per line), via "urls_file"
#
# Fidelity note: monolith freezes the HTML as the server sent it — it does
# not run JavaScript. That's a faithful copy for most sites (blogs, docs,
# marketing pages, server-rendered apps). For pages that build their
# content client-side (SPAs), set "render_js" to true: the workflow then
# pre-renders the page with headless Chrome first and hands the fully
# rendered DOM to monolith instead.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Single URL to archive (leave blank if only using urls_file)"
        required: false
        default: ""
      urls_file:
        description: "Repo file with one URL per line (used only if it exists)"
        required: false
        default: "urls.txt"
      render_js:
        description: "Pre-render with headless Chrome (for JS-heavy / SPA sites)"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      commit_results:
        description: "Commit the generated HTML files back to this repo"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  # Optional: archive everything in urls_file on a schedule instead of by hand.
  # schedule:
  #   - cron: "0 6 * * 1"   # every Monday at 06:00 UTC

permissions:
  contents: write   # only needed for the commit step; harmless if unused

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install monolith
        run: |
          set -e
          echo "Fetching latest monolith release..."
          if curl -fL -o /usr/local/bin/monolith \
              https://github.com/Y2Z/monolith/releases/latest/download/monolith-gnu-linux-x86_64; then
            chmod +x /usr/local/bin/monolith
          else
            echo "Prebuilt binary unavailable — building from source with cargo instead."
            cargo install monolith --locked
          fi
          monolith --version

      - name: Collect URLs to archive
        env:
          URL: ${{ inputs.url }}
          URLS_FILE: ${{ inputs.urls_file }}
        run: |
          mkdir -p snapshots
          : > urls_to_process.txt

          if [ -n "$URL" ]; then
            echo "$URL" >> urls_to_process.txt
          fi

          if [ -n "$URLS_FILE" ] && [ -f "$URLS_FILE" ]; then
            cat "$URLS_FILE" >> urls_to_process.txt
          fi

          sed -i '/^[[:space:]]*$/d' urls_to_process.txt
          count=$(wc -l < urls_to_process.txt)
          echo "Found $count URL(s):"
          cat urls_to_process.txt

          if [ "$count" -eq 0 ]; then
            echo "::error::No URLs provided. Set the 'url' input or add lines to $URLS_FILE."
            exit 1
          fi

      - name: Archive each URL
        env:
          RENDER_JS: ${{ inputs.render_js }}
          UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "== Archiving: $url =="

            safe_name=$(printf '%s' "$url" | sed -E 's~^https?://~~; s~[^a-zA-Z0-9._-]+~_~g' | cut -c1-150)
            timestamp=$(date -u +"%Y%m%d-%H%M%S")
            output_file="snapshots/${safe_name}_${timestamp}.html"

            if [ "$RENDER_JS" = "true" ]; then
              echo "Pre-rendering with headless Chrome..."
              google-chrome \
                --headless --disable-gpu --no-sandbox --disable-dev-shm-usage \
                --hide-scrollbars --window-size=1920,1080 \
                --run-all-compositor-stages-before-draw --virtual-time-budget=9000 \
                --user-agent="$UA" \
                --dump-dom "$url" \
                | monolith - -I -e -b "$url" -u "$UA" -o "$output_file" \
                || echo "::warning::Failed to archive $url"
            else
              monolith "$url" -I -e -u "$UA" -o "$output_file" \
                || echo "::warning::Failed to archive $url"
            fi

            if [ -s "$output_file" ]; then
              echo "Saved $(du -h "$output_file" | cut -f1) -> $output_file"
            fi
          done < urls_to_process.txt

      - name: Upload snapshots as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-snapshots
          path: snapshots/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit snapshots back to repo
        if: ${{ inputs.commit_results == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --cached --quiet; then
            git commit -m "Add webpage snapshot(s) [skip ci]"
            git push
          else
            echo "Nothing new to commit."
          fi
