name: Save Website Offline (Base64 Universal HTML)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL of the website to save'
        required: true
        default: 'https://example.com'
      filename:
        description: 'Name of the output file (without extension)'
        required: true
        default: 'offline-page'

jobs:
  capture-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      run: |
        npm install playwright single-file-cli
        npx playwright install chromium --with-deps

    - name: Scroll Page and Trigger Lazy-Load
      run: |
        cat << 'EOF' > scroll.js
        const { chromium } = require('playwright');
        const fs = require('fs');

        (async () => {
          console.log("Launching browser...");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
          });
          const page = await context.newPage();

          console.log("Navigating to target URL...");
          await page.goto(process.env.TARGET_URL, { waitUntil: 'load', timeout: 60000 });

          console.log("Scrolling down to un-lazy-load images...");
          await page.evaluate(async () => {
            await new Promise((resolve) => {
              let totalHeight = 0;
              const distance = 400;
              const timer = setInterval(() => {
                const scrollHeight = document.body.scrollHeight;
                window.scrollBy(0, distance);
                totalHeight += distance;

                if (totalHeight >= scrollHeight || totalHeight > 50000) { // Safety max height cap
                  clearInterval(timer);
                  resolve();
                }
              }, 100);
            });
          });

          // Rest to ensure images fully load over the network
          await page.waitForLoadState('networkidle');

          // Dump fully unpacked DOM
          const html = await page.content();
          fs.writeFileSync('expanded_state.html', html);
          console.log("DOM state successfully saved to disk.");

          await browser.close();
        })();
        EOF
        
        # Execute script via Node, passing the input URL as an env variable
        TARGET_URL="${{ github.event.inputs.url }}" node scroll.js

    - name: Compile to Base64 SingleFile HTML
      run: |
        # Use SingleFile to inline all images as base64 strings directly into a universal format
        npx single-file --base-url="${{ github.event.inputs.url }}" expanded_state.html "${{ github.event.inputs.filename }}.html"
        echo "Compilation complete!"

    - name: Upload HTML Document as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.filename }}
        path: ${{ github.event.inputs.filename }}.html
        retention-days: 7
